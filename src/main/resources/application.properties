spring.application.name=connector

# Azure Service Bus emulator (see compose.yaml)
servicebus.connection-string=Endpoint=sb://localhost:5673;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
servicebus.topic-name=playground-topic
servicebus.subscription-name=playground-subscription

# Temp: reduce startup logs (remove when done)
#logging.level.root=WARN
logging.level.org.springframework.boot.docker.compose=ERROR
logging.level.org.springframework.amqp=ERROR
logging.level.com.azure=ERROR
spring.main.banner-mode=off